name: C++ CMake CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cmake.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cmake.yml'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ runner.os }}

    - name: Install dependencies
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt-get update
        sudo apt-get install -y build-essential cmake pkg-config libcurl4-openssl-dev libsqlite3-dev libssl-dev libsecret-1-dev dbus-x11 gnome-keyring g++-13

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-13
      env:
        CCACHE_DIR: ${{ github.workspace }}/.ccache

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release -j$(nproc)

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: |
        # Start a D-Bus session and a mock Gnome Keyring daemon for libsecret tests
        dbus-run-session -- sh -c "
          echo 'test' | gnome-keyring-daemon --unlock
          ctest -C Release --output-on-failure
        "
