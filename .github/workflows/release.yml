name: Release CD

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-${{ runner.os }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libcurl4-openssl-dev libsqlite3-dev libssl-dev libsecret-1-dev g++-12

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-12
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Package
        run: |
          mkdir -p staging
          cp build/moodle-storage staging/mstorage
          chmod +x staging/mstorage
          cd staging
          tar -czvf ../moodle-storage-linux-amd64.tar.gz mstorage

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: moodle-storage-linux-amd64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
